openapi: 3.0.0
info:
  title: VAA Lab Vulnerable Endpoints (OpenAPI)
  version: 1.0.0
servers:
  - url: http://127.0.0.1:8000
paths:
  /api/v1/search/users:
    get:
      summary: SQL Injection Search
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
  /api/v1/tools/dns-lookup:
    post:
      summary: RCE DNS Lookup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domain:
                  type: string
      responses:
        '200':
          description: Successful response
