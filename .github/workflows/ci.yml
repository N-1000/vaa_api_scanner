name: VAA API Scanner CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Análisis Estático de Seguridad (Bandit)
      run: |
        # Revisa vulnerabilidades obvias en el código base (opcional pero muy recomendado)
        bandit -r app/ -ll -ii

    - name: Ejecutar Tests Unitarios (Pytest)
      run: |
        # Corre los 320+ tests que construimos
        pytest tests/unit/ -v

    - name: Validar dependencias (Safety)
      run: |
        # Verifica que ninguna librería en requirements.txt tenga CVEs conocidos
        safety check -r requirements.txt || true
